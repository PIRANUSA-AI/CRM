name: crm

services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: 2l8xHHcw0Wai4Qn01C7hbLkaM_vbctog
      POSTGRES_DB: crm_db
    ports:
      - "127.0.0.1:5431:5432"
    # ↑ 5431 dipake biar gak bentrok sama PostgreSQL lain di VPS
    volumes:
      - crm_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm -d crm_db"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - crm_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 2s

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-crm_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-crm_minio_change_me}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - crm_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 5s

  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >-
      /bin/sh -c "mc alias set crm http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing crm/$$S3_BUCKET &&
      mc anonymous set download crm/$$S3_BUCKET"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-crm_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-crm_minio_change_me}
      S3_BUCKET: ${S3_BUCKET:-crm-media}

volumes:
  crm_postgres_data:
  crm_redis_data:
  crm_minio_data:
