server {
	listen 80;
	server_name crm.contrivent.com;

	client_max_body_size 50m;

	# Cloudflare: biar dapet IP asli visitor, bukan IP Cloudflare
	set_real_ip_from 173.245.48.0/20;
	set_real_ip_from 103.21.244.0/22;
	set_real_ip_from 103.22.200.0/22;
	set_real_ip_from 103.31.4.0/22;
	set_real_ip_from 141.101.64.0/18;
	set_real_ip_from 108.162.192.0/18;
	set_real_ip_from 190.93.240.0/20;
	set_real_ip_from 188.114.96.0/20;
	set_real_ip_from 197.234.240.0/22;
	set_real_ip_from 198.41.128.0/17;
	set_real_ip_from 162.158.0.0/15;
	set_real_ip_from 104.16.0.0/13;
	set_real_ip_from 104.24.0.0/14;
	set_real_ip_from 172.64.0.0/13;
	set_real_ip_from 131.0.72.0/22;
	real_ip_header CF-Connecting-IP;

	# Root: serving maintenance page directly
	root /var/www/crm/apps/frontend/public;
	index maintenance.html;

	# Backend API
	location /api/ {
		proxy_pass http://127.0.0.1:3010;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}

	# Auth
	location /auth/ {
		proxy_pass http://127.0.0.1:3010;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}

	# Socket.IO (WebSocket)
	location /socket.io/ {
		proxy_pass http://127.0.0.1:3011;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection 'upgrade';
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}

	# Frontend SSR: fallback maintenance page kalo lagi down
	location / {
		proxy_pass http://127.0.0.1:3100;
		proxy_http_version 1.1;
		proxy_connect_timeout 5;
		proxy_read_timeout 10;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection 'upgrade';
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_cache_bypass $http_upgrade;
		proxy_intercept_errors on;
		error_page 502 503 =200 /maintenance.html;
		add_header Cache-Control "no-store, no-cache, must-revalidate" always;
	}

	location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
		proxy_pass http://127.0.0.1:3100;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		add_header Cache-Control "public, immutable, max-age=31536000" always;
	}

	# Serve maintenance.html: dipake pas frontend lagi build
	location = /maintenance.html {
		root /var/www/crm/apps/frontend/public;
	}

	# MinIO/S3 media: proxy biar bisa diakses publik
	location ^~ /crm-media/ {
		proxy_pass http://127.0.0.1:9000/crm-media/;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		add_header Cache-Control "public, immutable, max-age=31536000" always;
	}
}
