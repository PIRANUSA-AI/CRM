<!doctype html>
<html lang="id">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#17365f" />
		<title>CRM sedang offline</title>
		<style>
			:root { color-scheme: light; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
			* { box-sizing: border-box; }
			body { margin: 0; min-height: 100svh; display: grid; place-items: center; padding: 24px; background: #f7f3e9; color: #142942; }
			main { width: min(100%, 420px); text-align: center; }
			.signal { width: 52px; height: 52px; margin: 0 auto 20px; display: grid; place-items: center; border-radius: 14px; background: #17365f; color: white; font-size: 24px; }
			h1 { margin: 0; font-family: Georgia, serif; font-size: clamp(30px, 8vw, 42px); font-weight: 500; line-height: 1.08; letter-spacing: -0.03em; }
			p { margin: 14px auto 0; max-width: 36ch; color: #58697c; font-size: 15px; line-height: 1.6; }
			button { margin-top: 24px; min-height: 44px; border: 0; border-radius: 12px; padding: 0 18px; background: #17365f; color: white; font: inherit; font-weight: 700; cursor: pointer; }
			button:focus-visible { outline: 3px solid #8eb6e2; outline-offset: 3px; }
		</style>
	</head>
	<body>
		<main>
			<div class="signal" aria-hidden="true">!</div>
			<h1>Koneksi sedang terputus</h1>
			<p>CRM belum bisa mengambil data baru. Halaman yang pernah kamu buka tetap tersedia selama tersimpan di perangkat ini.</p>
			<button type="button" onclick="window.location.reload()">Coba hubungkan lagi</button>
		</main>
	</body>
</html>
