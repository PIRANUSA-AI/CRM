name: Deploy ke VPS (CRM)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy CRM
        run: |
          cd /var/www/crm
          git reset --hard origin/main
          git pull origin main
          bun install --frozen-lockfile
          export DATABASE_URL=$(grep ^DATABASE_URL .env | head -1 | cut -d= -f2-)
          export NODE_ENV=production
          bun run db:generate
          bun run build:backend
          bun run db:push
          pm2 stop crm-frontend
          bun run build:frontend
          pm2 start ecosystem.config.json --only crm-frontend
          cd /var/www/crm/whatsapp-service && bun install && cd /var/www/crm
          pm2 start ecosystem.config.json --only crm-whatsapp
          pm2 restart crm-api crm-worker crm-scheduler
          pm2 save
