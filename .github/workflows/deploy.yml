name: Deploy ke VPS (CRM)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy CRM
        run: |
          cd /var/www/crm
          git reset --hard origin/main
          git pull origin main
          bun install --frozen-lockfile
          bun run build
          cd apps/backend && bunx prisma generate && bunx prisma db push && cd ../..
          pm2 restart ecosystem.config.json
          pm2 save
